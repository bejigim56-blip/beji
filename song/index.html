<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베지 — 노래책</title>
<link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/an/angel000429/angel000429.jpg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --main:#00D8FF; --main-dark:#00A8CC; --main-deep:#006B80;
  --main-light:#C8F5FF; --main-pale:#E8FBFF;
  --bg:#D4F4FA; --card:#FFFFFF; --logo:#006B80;
  --text:#1a2e35; --text-soft:#6b8fa0; --accent:#0100FF;
  --shadow:0 4px 24px rgba(0,180,220,.12);
  --transition:.2s ease;
}
body.dark {
  --main:#00D8FF; --main-dark:#5de8ff; --main-deep:#8ef3ff;
  --main-light:#0d2b35; --main-pale:#0a1f28;
  --bg:#0b1e26; --card:#0f2530; --logo:#5de8ff;
  --text:#d8f5fc; --text-soft:#5a9bb0; --accent:#7b7bff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.ed-dark{position:fixed;top:18px;right:18px;z-index:800;width:22px;height:33px;border-radius:999px;border:1.5px solid var(--main-light);background:#e8f8fc;cursor:pointer;padding:0}
.ed-dark .knob{position:absolute;left:1.5px;top:1.5px;width:16px;height:16px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:.2s}
body.dark .ed-dark{background:#0d2230}
body.dark .ed-dark .knob{top:14px;background:#0b1e26}
#fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#fx .fxfb{position:absolute;top:-26px;opacity:0;animation:fxFall linear infinite;font-size:18px}
@keyframes fxFall{0%{transform:translateY(-26px) rotate(0);opacity:0}12%{opacity:.4}88%{opacity:.3}100%{transform:translateY(103vh) translateX(var(--drift,20px)) rotate(180deg);opacity:0}}
@media(prefers-reduced-motion:reduce){#fx{display:none}}
.editorial{padding:24px clamp(12px,5vw,56px) 48px;position:relative;z-index:1}
.sheet{max-width:1060px;margin:0 auto;background:var(--card);border-radius:30px;box-shadow:0 24px 80px rgba(0,180,220,.14);opacity:0;transition:opacity .35s}
body.ready .sheet{opacity:1}
.masthead{text-align:center;padding:32px 28px 0;border-bottom:2px solid var(--text)}
body.dark .masthead{border-color:var(--text-soft)}
.mh-top{display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-soft);margin-bottom:8px}
.mh-title{font-family:'Playfair Display',serif;font-size:clamp(52px,7vw,80px);font-weight:900;letter-spacing:6px;color:var(--logo);line-height:1;margin-bottom:4px}
.mh-sub{font-size:12px;color:var(--text-soft);font-weight:500;letter-spacing:2px;padding-bottom:18px}
.ed-nav{display:flex;gap:0;text-align:left;margin-top:-12px;padding-bottom:14px;flex-wrap:wrap}
.ed-nav a{font-size:14px;font-weight:600;color:var(--text-soft);text-decoration:none;padding:0 18px 0 0;letter-spacing:2px;text-transform:uppercase;transition:.15s}
.ed-nav a:hover{color:var(--main-dark)}
.ed-nav a.active{color:var(--main-dark);font-weight:700}
.ed-content{padding:28px clamp(16px,3vw,36px) 0}
.sec-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;letter-spacing:1px;color:var(--logo);border-bottom:1px solid var(--main);padding-bottom:10px;margin-bottom:20px}
.ed-footer{border-top:2px solid var(--text);display:flex;justify-content:space-between;align-items:center;padding:16px 28px;font-size:11px;color:var(--text-soft);margin-top:28px}
body.dark .ed-footer{border-color:var(--text-soft)}
.spinner{width:32px;height:32px;border:3px solid var(--main-light);border-top-color:var(--main);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:760px){.ed-footer{flex-direction:column;gap:4px;text-align:center}.ed-nav{flex-wrap:wrap}}
@media(max-width:480px){.mh-top{flex-direction:column;gap:2px}}

/* ─── 노래책 전용 CSS ─── */

    .song-head { display:flex; align-items:center; gap:9px; margin-bottom:14px; }
    .song-head .t { font-size:22px; font-weight:800; color:var(--main-dark); }
    .filter-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:8px; }
    .search-box { flex:1; min-width:200px; padding:12px 18px; border-radius:999px; border:1.5px solid var(--main-light); font-size:14px; outline:none; background:var(--card); }
    .search-box:focus { border-color:var(--main); }
    .genre-tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .gt { padding:8px 15px; border-radius:999px; border:1.5px solid var(--main-light); background:var(--card); color:var(--text-soft); font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
    .gt.active { background:var(--main); color:#fff; border-color:var(--main); }
    .count-line { font-size:13px; color:var(--text-soft); margin:14px 0 6px; }
    table { width:100%; border-collapse:collapse; }
    thead th { text-align:left; font-size:12px; font-weight:700; color:var(--main-dark); padding:10px 12px; background:var(--main-light); }
    thead th:first-child { border-radius:8px 0 0 8px; } thead th:last-child { border-radius:0 8px 8px 0; }
    tbody td { padding:13px 12px; border-bottom:1px solid var(--main-light); font-size:14px; color:var(--text); }
    tbody tr:hover td { background:var(--main-light); }
    .s-num { color:var(--text-soft); font-size:13px; width:36px; }
    .s-title { font-weight:600; }
    .s-genre { font-size:11px; background:var(--main-light); color:var(--main-dark); padding:3px 10px; border-radius:999px; white-space:nowrap; display:inline-block; }
    .s-diff { display:inline-flex; gap:3px; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--main-light); }
    .dot.on { background:var(--main); }
    .pagination { display:flex; justify-content:center; gap:6px; margin-top:16px; }
    .pg { width:34px; height:34px; border-radius:50%; border:1.5px solid var(--main-light); background:var(--card); color:var(--text-mid); font-size:13px; font-weight:600; cursor:pointer; }
    .pg.active { background:var(--main); color:#fff; border-color:var(--main); }
    body.dark thead th { background:#22262e; }
    body.dark tbody tr:hover td { background:#22262e; }
    body.dark .search-box { background:var(--card); color:var(--text); }
    body.dark .pg { background:var(--card); color:var(--text); }
    @media (max-width:560px){
      .hide-m { display:none; }
      thead th { padding:9px 8px; font-size:11px; }
      tbody td { padding:11px 6px; font-size:13px; }
      .s-num { width:24px; font-size:12px; }
      .s-genre { font-size:10px; padding:2px 8px; }
      .dot { width:7px; height:7px; }
    }
  
</style>

<body>

<div class="editorial">

    <div class="mh-sub">⚡ 안농? 나는 너의 마음속에 사는 베지라구해 ⚡</div>
    <div class="ed-nav">
      <a href="../index.html">메인</a>
      <a href="../profile/">프로필</a>
      <a href="../schedule/">일정</a>
      <a href="../dress/">옷장</a>
      <a href="../work/">업보</a>
      <a href="index.html" class="active">노래책</a>

  <div class="ed-content">

      <table>
        <thead><tr><th class="s-num">#</th><th>제목</th><th class="hide-m">아티스트</th><th>장르</th><th>난이도</th></tr></thead>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  const GENRES = ['전체','K-Pop','J-Pop','Pop','애교송','기타'];
  const PAGE = 30;
  let songs = [], curGenre = '전체', curPage = 1, keyword = '';

  async function init() {
    songs = await fetchAll('songs', { order: 'id', asc: true });
    renderGenres(); render();
    enableIframeAutoHeight();
    document.body.classList.add('ready');
  }
  function renderGenres() {
    document.getElementById('genre-tabs').innerHTML = GENRES.map(g =>
      `<button class="gt ${g===curGenre?'active':''}" onclick="selGenre('${g}')">${g}</button>`).join('');
  }
  function selGenre(g){ curGenre=g; curPage=1; renderGenres(); render(); enableIframeAutoHeight(); }

  function filtered() {
    return songs.filter(s => {
      const okG = curGenre==='전체' || s.genre===curGenre;
      const q = keyword.toLowerCase();
      const okQ = !q || (s.title||'').toLowerCase().includes(q) || (s.artist||'').toLowerCase().includes(q);
      return okG && okQ;
    });
  }
  function render() {
    const list = filtered();
    const totalPages = Math.max(1, Math.ceil(list.length / PAGE));
    if (curPage > totalPages) curPage = 1;
    const pageItems = list.slice((curPage-1)*PAGE, curPage*PAGE);
    document.getElementById('count').textContent = `총 ${list.length}곡 · ${curPage}/${totalPages} 페이지`;
    const body = document.getElementById('song-body');
    if (!list.length) { body.innerHTML = '<tr><td colspan="5"><div class="empty"><div class="empty-icon">🎵</div>노래가 없어요</div></td></tr>'; document.getElementById('pagination').innerHTML=''; return; }
    body.innerHTML = pageItems.map((s, i) => {
      const num = (curPage-1)*PAGE + i + 1;
      const diff = parseInt(s.difficulty)||0;
      let dots=''; for(let k=1;k<=5;k++) dots+=`<span class="dot${k<=diff?' on':''}"></span>`;
      return `<tr>
        <td class="s-num">${num}</td>
        <td class="s-title">${esc(s.title)}</td>
        <td class="hide-m">${esc(s.artist)||'-'}</td>
        <td><span class="s-genre">${esc(s.genre)||'기타'}</span></td>
        <td><span class="s-diff">${dots}</span></td>
      </tr>`;
    }).join('');
    const pg = document.getElementById('pagination'); pg.innerHTML='';
    if (totalPages>1) for(let i=1;i<=totalPages;i++){
      const b=document.createElement('button'); b.className='pg'+(i===curPage?' active':''); b.textContent=i;
      b.onclick=()=>{ curPage=i; render(); enableIframeAutoHeight(); window.scrollTo(0,0); };
      pg.appendChild(b);
    }
  }
  document.getElementById('search').addEventListener('input', e=>{ keyword=e.target.value.trim(); curPage=1; render(); enableIframeAutoHeight(); });
  init();

setTimeout(function(){document.body.classList.add('ready')},1200);
</script>
<script>
(function(){
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  var sw = document.getElementById('themeSwitch'), knob = document.getElementById('themeKnob');
  function refresh(){ if(knob) knob.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙'; }
  if (sw) sw.addEventListener('click', function(){
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    refresh();
  });
  refresh();
})();
</script>
