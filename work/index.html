<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베지 — 업보</title>
<link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/an/angel000429/angel000429.jpg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --main:#00D8FF; --main-dark:#00A8CC; --main-deep:#006B80;
  --main-light:#C8F5FF; --main-pale:#E8FBFF;
  --bg:#D4F4FA; --card:#FFFFFF; --logo:#006B80;
  --text:#1a2e35; --text-soft:#6b8fa0; --accent:#0100FF;
  --shadow:0 4px 24px rgba(0,180,220,.12);
  --shadow-hover:0 8px 32px rgba(0,180,220,.2);
  --transition:.2s ease;
}
body.dark {
  --main:#00D8FF; --main-dark:#5de8ff; --main-deep:#8ef3ff;
  --main-light:#0d2b35; --main-pale:#0a1f28;
  --bg:#0b1e26; --card:#0f2530; --logo:#5de8ff;
  --text:#d8f5fc; --text-soft:#5a9bb0; --accent:#7b7bff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.ed-dark{position:fixed;top:18px;right:18px;z-index:800;width:22px;height:33px;border-radius:999px;border:1.5px solid var(--main-light);background:#e8f8fc;cursor:pointer;padding:0}
.ed-dark .knob{position:absolute;left:1.5px;top:1.5px;width:16px;height:16px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:.2s}
body.dark .ed-dark{background:#0d2230}
body.dark .ed-dark .knob{top:14px;background:#0b1e26}
#fx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#fx .fxfb{position:absolute;top:-26px;opacity:0;animation:fxFall linear infinite;font-size:18px}
@keyframes fxFall{0%{transform:translateY(-26px) rotate(0);opacity:0}12%{opacity:.4}88%{opacity:.3}100%{transform:translateY(103vh) translateX(var(--drift,20px)) rotate(180deg);opacity:0}}
@media(prefers-reduced-motion:reduce){#fx{display:none}}
.editorial{padding:24px clamp(12px,5vw,56px) 48px;position:relative;z-index:1}
.sheet{max-width:1060px;margin:0 auto;background:var(--card);border-radius:30px;box-shadow:0 24px 80px rgba(0,180,220,.14);opacity:0;transition:opacity .35s}
body.ready .sheet{opacity:1}
.masthead{text-align:center;padding:32px 28px 0;border-bottom:2px solid var(--text)}
body.dark .masthead{border-color:var(--text-soft)}
.mh-top{display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-soft);margin-bottom:8px}
.mh-title{font-family:'Playfair Display',serif;font-size:clamp(52px,7vw,80px);font-weight:900;letter-spacing:6px;color:var(--logo);line-height:1;margin-bottom:4px}
.mh-sub{font-size:12px;color:var(--text-soft);font-weight:500;letter-spacing:2px;padding-bottom:18px}
.ed-nav{display:flex;gap:0;text-align:left;margin-top:-12px;padding-bottom:14px;flex-wrap:wrap}
.ed-nav a{font-size:14px;font-weight:600;color:var(--text-soft);text-decoration:none;padding:0 18px 0 0;letter-spacing:2px;text-transform:uppercase;transition:.15s}
.ed-nav a:hover{color:var(--main-dark)}
.ed-nav a.active{color:var(--main-dark);font-weight:700}
.ed-content{padding:28px clamp(16px,3vw,36px) 0}
.sec-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;letter-spacing:1px;color:var(--logo);border-bottom:1px solid var(--main);padding-bottom:10px;margin-bottom:20px}
.ed-footer{border-top:2px solid var(--text);display:flex;justify-content:space-between;align-items:center;padding:16px 28px;font-size:11px;color:var(--text-soft);margin-top:28px}
body.dark .ed-footer{border-color:var(--text-soft)}
.spinner{width:32px;height:32px;border:3px solid var(--main-light);border-top-color:var(--main);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:760px){.ed-footer{flex-direction:column;gap:4px;text-align:center}.ed-nav{flex-wrap:wrap}}
@media(max-width:480px){.mh-top{flex-direction:column;gap:2px}}

/* ─── 페이지 전용 CSS ─── */

    .upbo-head { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:6px; }
    .upbo-eyebrow { font-size:12px; letter-spacing:3px; color:var(--main); font-weight:700; }
    .upbo-title { font-size:26px; font-weight:800; color:var(--main-dark); }
    .upbo-update { font-size:12px; color:var(--text-soft); background:var(--card); border:1px solid var(--main-light); padding:6px 14px; border-radius:999px; }
    .search-box { width:100%; padding:13px 18px; border-radius:999px; border:1.5px solid var(--main-light); font-size:14px; outline:none; background:var(--card); margin:14px 0 18px; }
    .search-box:focus { border-color:var(--main); }

    .viewer-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    @media (max-width:680px){ .viewer-grid{ grid-template-columns:repeat(2,1fr); gap:9px;} }
    @media (max-width:380px){ .viewer-grid{ grid-template-columns:repeat(2,1fr); gap:8px;} .viewer-card{ padding:14px 8px;} .viewer-av,.viewer-av-fb{ width:52px; height:52px;} }
    .viewer-card {
      background:var(--card); border:1.5px solid var(--main-light); border-radius:18px;
      padding:20px 14px; text-align:center; cursor:pointer; transition:all .2s;
    }
    .viewer-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-hover); border-color:var(--main); }
    .viewer-av { width:62px; height:62px; border-radius:50%; object-fit:cover; margin:0 auto 10px; display:block; border:3px solid var(--main-light); background:var(--main-light); }
    .viewer-av-fb { width:62px; height:62px; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#e6e9ee,#c4cad4); color:#fff; font-size:24px; font-weight:700; border:3px solid var(--main-light); }
    .viewer-nick { font-size:14px; font-weight:700; color:var(--text); }
    .viewer-id { font-size:11px; color:var(--text-soft); margin:2px 0 8px; }
    .viewer-total { display:inline-block; background:var(--main); color:#fff; border-radius:999px; padding:3px 14px; font-size:12px; font-weight:700; }

    .ov { position:absolute; left:0; right:0; background:rgba(22,26,32,0.35); display:none; align-items:flex-start; justify-content:center; z-index:500; padding:16px; }
    .ov.show { display:flex; }
    .modal {
      background:var(--card); border-radius:22px; width:100%; max-width:420px;
      max-height:84vh; display:flex; flex-direction:column; overflow:hidden;
      box-shadow:0 20px 60px rgba(80,93,107,0.3); animation:pop .22s ease;
    }
    @keyframes pop { from{ transform:scale(.94); opacity:0;} to{ transform:scale(1); opacity:1;} }
    .modal-top { display:flex; align-items:center; gap:12px; padding:20px 22px 16px; border-bottom:1px solid var(--main-light); position:relative; }
    .modal-av { width:52px; height:52px; border-radius:50%; object-fit:cover; border:3px solid var(--main-light); background:var(--main-light); flex-shrink:0; }
    .modal-av-fb { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#e6e9ee,#c4cad4); color:#fff; font-size:20px; font-weight:700; border:3px solid var(--main-light); flex-shrink:0; }
    .modal-nick { font-size:18px; font-weight:800; color:var(--main-dark); line-height:1.2; }
    .modal-id { font-size:12px; color:var(--text-soft); }
    .modal-x { position:absolute; top:16px; right:18px; background:none; border:none; font-size:22px; color:var(--text-soft); cursor:pointer; line-height:1; }
    .modal-body { padding:14px 18px 20px; overflow-y:auto; }
    .upbo-row {
      display:flex; align-items:center; gap:10px; padding:11px 14px; margin-bottom:7px;
      background:var(--main-light); border:1px solid var(--main-light); border-radius:12px;
    }
    .upbo-row .nm { flex:1; font-size:14px; color:var(--text); font-weight:500; }
    .upbo-row .ev { font-size:10px; font-weight:700; color:#b07d18; background:var(--card)0d6; padding:2px 8px; border-radius:999px; }
    .upbo-row .ct { font-size:13px; font-weight:800; color:var(--main-dark); background:var(--card); border:1.5px solid var(--main-light); border-radius:999px; padding:3px 12px; min-width:42px; text-align:center; }
    .modal-empty { text-align:center; color:var(--text-soft); padding:30px; font-size:14px; }
    body.dark .upbo-update { background: var(--card); }
    body.dark .search-box { background: var(--card); color: var(--text); }
    body.dark .viewer-card { background: var(--card); }
    body.dark .modal { background: var(--card); }
    body.dark .upbo-row { background: #22262e; }
    body.dark .upbo-row .ct { background: var(--card); }
  
</style>
</head>
<body>

<button class="ed-dark" id="themeSwitch" type="button"><span class="knob" id="themeKnob">🌙</span></button>
<div id="fx"></div>

<div class="editorial">
<div class="sheet">

  <div class="masthead">
    <div class="mh-top"><span>Issue 01 · 2024</span><span>SOOP Live</span><span>angel000429</span></div>
    <div class="mh-title">VEGGIE</div>
    <div class="mh-sub">⚡ 안농? 나는 너의 마음속에 사는 베지라구해 ⚡</div>
    <div class="ed-nav">
      <a href="../index.html">메인</a>
      <a href="../profile/">프로필</a>
      <a href="../schedule/">일정</a>
      <a href="../dress/">옷장</a>
      <a href="index.html" class="active">업보</a>
    </div>
  </div>

  <div class="ed-content">
    <div class="sec-title">Upbo</div>
    <div class="upbo-head">
      <div></div>
      <span class="upbo-update" id="update-date"></span>
    </div>
    <input class="search-box" id="search" placeholder="🔍 닉네임 또는 아이디 검색...">
    <div class="viewer-grid" id="grid"><div class="spinner"></div></div>
  </div>

  <div class="ed-footer">
    <span>© 2026 베지 Official.</span>
    <span>비즈니스 문의 — 문의 버튼을 이용해 주세요</span>
  </div>

</div>
</div>
<div class="ov" id="ov" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-top" id="modal-top"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function soopAvatar(id){ if(!id) return null; id=String(id).trim().toLowerCase(); if(id.length<2) return null; return `https://profile.img.sooplive.co.kr/LOGO/${id.slice(0,2)}/${id}/${id}.jpg`; }

  let viewers=[], types=[], counts=[];

  async function init(){
    [viewers, types, counts] = await Promise.all([
      fetchAll('viewers', { order:'sort_order', asc:true }),
      fetchAll('upbo_types', { order:'sort_order', asc:true }),
      fetchAll('upbo_counts', { order:'id', asc:true })
    ]);
    let latest = counts.reduce((m,c)=> c.updated_at && c.updated_at>m ? c.updated_at : m, '');
    document.getElementById('update-date').textContent = latest ? '갱신일: ' + latest.slice(0,10) : '';
    render(viewers);
    enableIframeAutoHeight();
  }

  function viewerTotal(vid){
    return counts.filter(c=>c.viewer_id===vid && c.count>0).reduce((s,c)=>s+c.count,0);
  }

  function render(list){
    const grid=document.getElementById('grid');
    if(!list.length){ grid.innerHTML='<div style="grid-column:1/-1"><div class="empty"><div class="empty-icon">⚡</div>시청자가 없어요</div></div>'; enableIframeAutoHeight(); return; }
    grid.innerHTML = list.map(v=>{
      const av=soopAvatar(v.soop_id); const ini=(v.nickname||'?').charAt(0);
      const avHtml = av ? `<img class="viewer-av" src="${av}" onerror="this.outerHTML='<div class=\\'viewer-av-fb\\'>${ini}</div>'">` : `<div class="viewer-av-fb">${ini}</div>`;
      const total=viewerTotal(v.id);
      return `<div class="viewer-card" onclick="openModal(${v.id})">
        ${avHtml}
        <div class="viewer-nick">${esc(v.nickname)}</div>
        ${v.soop_id?`<div class="viewer-id">(${esc(v.soop_id)})</div>`:'<div class="viewer-id">&nbsp;</div>'}
        <span class="viewer-total">업보 ${total}</span>
      </div>`;
    }).join('');
    enableIframeAutoHeight();
  }

  function openModal(vid){
    const v=viewers.find(x=>x.id===vid); if(!v) return;
    const av=soopAvatar(v.soop_id); const ini=(v.nickname||'?').charAt(0);
    const avHtml = av ? `<img class="modal-av" src="${av}" onerror="this.outerHTML='<div class=\\'modal-av-fb\\'>${ini}</div>'">` : `<div class="modal-av-fb">${ini}</div>`;
    document.getElementById('modal-top').innerHTML = `
      ${avHtml}
      <div><div class="modal-nick">${esc(v.nickname)}</div>${v.soop_id?`<div class="modal-id">(${esc(v.soop_id)})</div>`:''}</div>
      <button class="modal-x" onclick="closeModal()">✕</button>`;

    const myCounts = {};
    counts.filter(c=>c.viewer_id===vid).forEach(c=>{ myCounts[c.type_id]=c.count; });
    const rows = types.filter(t=>(myCounts[t.id]||0)>0).map(t=>`
      <div class="upbo-row">
        <span class="nm">${esc(t.name)}</span>
        ${t.category==='이벤트'?'<span class="ev">이벤트</span>':''}
        <span class="ct">×${myCounts[t.id]}</span>
      </div>`).join('');
    document.getElementById('modal-body').innerHTML = rows || '<div class="modal-empty">아직 업보가 없어요 ♡</div>';
    const ov = document.getElementById('ov');
    // SOOP iframe(고정높이·스크롤off) 대응: 클릭 지점 기준으로 모달 띄움
    const e = window.event;
    let y = 200;
    if (e) { y = (e.pageY != null ? e.pageY : (e.clientY||0)); }
    ov.style.top = Math.max(10, y - 80) + 'px';
    ov.style.height = 'auto';
    ov.style.minHeight = '0';
    ov.classList.add('show');
  }
  function closeModal(){ document.getElementById('ov').classList.remove('show'); }

  document.getElementById('search').addEventListener('input', e=>{
    const q=e.target.value.trim().toLowerCase();
    render(viewers.filter(v=> (v.nickname||'').toLowerCase().includes(q) || (v.soop_id||'').toLowerCase().includes(q)));
  });

  init();

setTimeout(function(){document.body.classList.add('ready')},1200);
document.body.classList.add('ready');
</script>
<script>
(function(){
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  var sw = document.getElementById('themeSwitch'), knob = document.getElementById('themeKnob');
  function refresh(){ if(knob) knob.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙'; }
  if (sw) sw.addEventListener('click', function(){
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    refresh();
  });
  refresh();
})();
</script>
<script>var FX_FLOAT=['⚡','✦','⚡','✧','⚡'];var FX_CLICK='⚡';var FX_COUNT=12;var FX_TILT=true;var FX_LOADER=true;var FX_LOADER_TEXT='⚡';var FX_TRANS_MS=800;</script>
<script src="../fx.js"></script>
</body>
</html>
